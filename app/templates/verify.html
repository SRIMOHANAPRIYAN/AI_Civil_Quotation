<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify Quotation Data</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; display: flex; justify-content: center; padding: 40px 0; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 100%; max-width: 800px; }
        h1 { color: #0f172a; margin-top: 0; }
        .alert { background-color: #fffbeb; border-left: 4px solid #f59e0b; padding: 15px; margin-bottom: 20px; color: #92400e; font-size: 14px; }
        textarea { width: 100%; height: 400px; padding: 15px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: monospace; font-size: 14px; margin-bottom: 20px; box-sizing: border-box; background-color: #1e1e1e; color: #d4d4d4; }
        button { background-color: #10b981; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; }
        button:hover { background-color: #059669; }
        .back-link { display: inline-block; margin-top: 15px; color: #64748b; text-decoration: none; text-align: center; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Verify & Edit Details</h1>
        <div class="alert">
            <strong>Action Required:</strong> Review the extracted data below. You can manually edit names, quantities, or prices directly in the code block before generating the final PDF.
        </div>

        <form action="/generate" method="POST" onsubmit="disableButton()">
            <textarea name="edited_json">{{ json_data }}</textarea>
            <button type="submit" id="final-btn">Approve & Generate PDF</button>
        </form>
        
        <script>
            function disableButton() {
                const btn = document.getElementById('final-btn');
                btn.innerText = "Generating PDF... Please wait.";
                btn.style.backgroundColor = "#64748b"; 
                setTimeout(() => { btn.disabled = true; }, 50); 
            }
        </script>
        <a href="/" class="back-link">← Start Over</a>
    </div>
</body>
</html>
